- name: Install Minikube on Ubuntu
  hosts: ubuntu
  become: true
  gather_facts: true

  vars:
    minikube_user: "{{ ansible_user }}"
    minikube_profile: minikube
    minikube_driver: docker
    minikube_cpus: 2
    minikube_memory: 4096
    start_minikube_cluster: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Minikube prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - conntrack
        state: present

    - name: Ensure docker group contains remote user
      ansible.builtin.user:
        name: "{{ minikube_user }}"
        groups: docker
        append: true

    - name: Reset SSH connection so new group membership is applied
      ansible.builtin.meta: reset_connection

    - name: Detect system architecture
      ansible.builtin.command: uname -m
      register: machine_arch
      changed_when: false

    - name: Map architecture for downloads
      ansible.builtin.set_fact:
        kubernetes_arch: >-
          {{
            'amd64' if machine_arch.stdout == 'x86_64'
            else 'arm64' if machine_arch.stdout in ['aarch64', 'arm64']
            else ''
          }}

    - name: Fail on unsupported architecture
      ansible.builtin.fail:
        msg: "Unsupported architecture: {{ machine_arch.stdout }}"
      when: kubernetes_arch == ''

    - name: Get latest stable kubectl version
      ansible.builtin.uri:
        url: https://dl.k8s.io/release/stable.txt
