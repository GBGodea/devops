---
- name: Install Docker on Ubuntu
  hosts: ubuntu
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true

    - name: Get dpkg architecture
      ansible.builtin.command: dpkg --print-architecture
      register: docker_arch
      changed_when: false

    - name: Get Ubuntu codename
      ansible.builtin.shell: . /etc/os-release && echo "$VERSION_CODENAME"
      register: ubuntu_codename
      changed_when: false

    - name: Add Docker apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"
        content: |
          deb [arch={{ docker_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ubuntu_codename.stdout }} stable

    - name: Update apt cache after Docker repo
      ansible.builtin.apt:
        update_cache: true

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add remote user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Check docker version
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Show docker version
      ansible.builtin.debug:
        var: docker_version.stdout

    - name: Check docker compose version
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false

    - name: Show docker compose version
      ansible.builtin.debug:
        var: compose_version.stdout