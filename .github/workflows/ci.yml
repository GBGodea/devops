name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend_build:
    name: Backend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew bootJar -x test --no-daemon

  backend_test:
    name: Backend - Test
    needs: backend_build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Test + Coverage
        run: ./gradlew test jacocoTestReport --no-daemon

  frontend_build:
    name: Frontend - Build
    needs: backend_test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front/my-react-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/my-react-app/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  frontend_test:
    name: Frontend - Test
    needs: frontend_build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front/my-react-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/my-react-app/package-lock.json

      - name: Install
        run: npm ci

      - name: Test + Coverage
        run: npm run test:coverage

  sonar_backend:
    name: Sonar - Backend
    needs: backend_test
    if: ${{ vars.SONAR_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:devops

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Test with coverage
        run: ./gradlew clean test jacocoTestReport --no-daemon

      - name: Sonar scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_SCANNER_OPTS: "-Dsonar.scanner.connectTimeout=120 -Dsonar.scanner.socketTimeout=900 -Dsonar.scanner.responseTimeout=900"
        run: |
          ./gradlew sonar \
            -Dsonar.host.url="$SONAR_HOST_URL" \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.scanner.connectTimeout=120 \
            -Dsonar.scanner.socketTimeout=900 \
            -Dsonar.scanner.responseTimeout=900 \
            --no-daemon

  sonar_frontend:
    name: Sonar - Frontend
    needs: frontend_test
    if: ${{ vars.SONAR_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:devops

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/my-react-app/package-lock.json

      - name: Install
        working-directory: front/my-react-app
        run: npm ci

      - name: Test with coverage
        working-directory: front/my-react-app
        run: npm run test:coverage

      - name: Sonar scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_SCANNER_OPTS: "-Dsonar.scanner.connectTimeout=120 -Dsonar.scanner.socketTimeout=900 -Dsonar.scanner.responseTimeout=900"
        with:
          projectBaseDir: front/my-react-app
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.scanner.connectTimeout=120
            -Dsonar.scanner.socketTimeout=900
            -Dsonar.scanner.responseTimeout=900

  docker_push:
    name: Push Docker Images
    needs: [frontend_test, sonar_backend, sonar_frontend]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.frontend_test.result == 'success' &&
      (needs.sonar_backend.result == 'success' || needs.sonar_backend.result == 'skipped') &&
      (needs.sonar_frontend.result == 'success' || needs.sonar_frontend.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            godofbros1/devops-backend:latest
            godofbros1/devops-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./front/my-react-app
          file: ./front/my-react-app/Dockerfile
          push: true
          tags: |
            godofbros1/devops-frontend:latest
            godofbros1/devops-frontend:${{ github.sha }}

  argocd_deploy:
    name: Argo CD - Deploy
    needs: docker_push
    if: ${{ needs.docker_push.result == 'success' && vars.ARGOCD_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      deploy_revision: ${{ steps.manifests.outputs.deploy_revision }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update Kubernetes image tags
        id: manifests
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          sed -i "s|image: godofbros1/devops-backend:.*|image: godofbros1/devops-backend:${IMAGE_TAG}|" k8s/backend-deployment.yaml
          sed -i "s|image: godofbros1/devops-frontend:.*|image: godofbros1/devops-frontend:${IMAGE_TAG}|" k8s/frontend-deployment.yaml

          if git diff --quiet -- k8s/backend-deployment.yaml k8s/frontend-deployment.yaml; then
            echo "deploy_revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "No Kubernetes manifest changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/backend-deployment.yaml k8s/frontend-deployment.yaml
          git commit -m "chore: deploy ${GITHUB_SHA::7} [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
          echo "deploy_revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Connect to Tailscale
        if: ${{ vars.ARGOCD_TAILSCALE_ENABLED == 'true' }}
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:devops

      - name: Install Argo CD CLI
        run: |
          curl -sSL -o /tmp/argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 /tmp/argocd-linux-amd64 /usr/local/bin/argocd
          argocd version --client

      - name: Sync Argo CD application
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_APP_NAME: ${{ vars.ARGOCD_APP_NAME || 'devops-app' }}
          ARGOCD_WAIT_TIMEOUT: ${{ vars.ARGOCD_WAIT_TIMEOUT || '300' }}
          ARGOCD_OPTS: ${{ vars.ARGOCD_OPTS }}
          DEPLOY_REVISION: ${{ steps.manifests.outputs.deploy_revision }}
        run: |
          set -euo pipefail

          : "${ARGOCD_SERVER:?Set ARGOCD_SERVER repository secret}"
          : "${ARGOCD_AUTH_TOKEN:?Set ARGOCD_AUTH_TOKEN repository secret}"

          ARGOCD_ARGS=()
          if [ -n "${ARGOCD_OPTS:-}" ]; then
            read -r -a ARGOCD_ARGS <<< "$ARGOCD_OPTS"
          fi

          argocd "${ARGOCD_ARGS[@]}" app sync "$ARGOCD_APP_NAME" --revision "$DEPLOY_REVISION"
          argocd "${ARGOCD_ARGS[@]}" app wait "$ARGOCD_APP_NAME" --health --sync --timeout "$ARGOCD_WAIT_TIMEOUT"

  notify:
    name: Telegram Notification
    needs:
      - backend_build
      - backend_test
      - frontend_build
      - frontend_test
      - sonar_backend
      - sonar_frontend
      - docker_push
      - argocd_deploy
    if: ${{ always() && vars.TELEGRAM_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Build status message
        id: status
        run: |
          emoji() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              cancelled) echo "⚠️" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "❔" ;;
            esac
          }

          overall="success"
          for r in "${{ needs.backend_build.result }}" \
                   "${{ needs.backend_test.result }}" \
                   "${{ needs.frontend_build.result }}" \
                   "${{ needs.frontend_test.result }}" \
                   "${{ needs.sonar_backend.result }}" \
                   "${{ needs.sonar_frontend.result }}" \
                   "${{ needs.docker_push.result }}" \
                   "${{ needs.argocd_deploy.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              overall="failure"
              break
            fi
          done

          overall_emoji=$(emoji "$overall")

          {
            echo "message<<EOF"
            echo "${overall_emoji} CI pipeline: *${overall}*"
            echo ""
            echo "Repo: \`${{ github.repository }}\`"
            echo "Branch: \`${{ github.ref_name }}\`"
            echo "Commit: \`${{ github.sha }}\`"
            echo "By: ${{ github.actor }}"
            echo ""
            echo "Jobs:"
            echo "$(emoji ${{ needs.backend_build.result }}) Backend - Build"
            echo "$(emoji ${{ needs.backend_test.result }}) Backend - Test"
            echo "$(emoji ${{ needs.frontend_build.result }}) Frontend - Build"
            echo "$(emoji ${{ needs.frontend_test.result }}) Frontend - Test"
            echo "$(emoji ${{ needs.sonar_backend.result }}) Sonar - Backend"
            echo "$(emoji ${{ needs.sonar_frontend.result }}) Sonar - Frontend"
            echo "$(emoji ${{ needs.docker_push.result }}) Push Docker Images"
            echo "$(emoji ${{ needs.argocd_deploy.result }}) Argo CD - Deploy"
            echo ""
            echo "[Run details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          MESSAGE: ${{ steps.status.outputs.message }}
        run: |
          if [ -z "$TELEGRAM_CHAT_IDS" ]; then
            echo "TELEGRAM_CHAT_IDS is empty — skipping"
            exit 0
          fi

          IFS=',' read -ra CHATS <<< "$TELEGRAM_CHAT_IDS"
          for raw_chat in "${CHATS[@]}"; do
            chat="$(echo "$raw_chat" | xargs)"
            [ -z "$chat" ] && continue

            echo ">>> Sending to chat: $chat"
            response=$(curl -s -w "\n%{http_code}" \
              -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${chat}" \
              --data-urlencode "parse_mode=Markdown" \
              --data-urlencode "disable_web_page_preview=true" \
              --data-urlencode "text=${MESSAGE}")

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" != "200" ]; then
              echo "FAILED for $chat (HTTP $http_code): $body"
            else
              echo "OK"
            fi
          done
